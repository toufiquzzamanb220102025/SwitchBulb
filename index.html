<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lightbulb ON/OFF Project</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Left Side - Hanging Bulb -->
    <div class="bulb-section">

        <div class="wire"></div>

        <div class="wire-connection"></div>

        <div class="top-socket"></div>

        <div class="bottom-socket"></div>

        <div class="socket-back"></div>

        <div class="bulb-top"></div>

        <div class="bulb-bottom"></div>

    </div>

    <!-- Right Side - Switch Panel -->
    <div class="switch-section">

        <div class="switch-cover">

            <div class="screw top"></div>

            <div class="switch-btn"></div>

            <div class="screw bottom"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
